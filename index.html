<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BISTRO ПАНТЮР — Продукты</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --card:#1a1a1a; --card2:#212121; --border:#2a2a2a;
  --accent:#e8c84a; --text:#f0ede6; --muted:#777;
  --ok:#4ade80; --warn:#e8c84a; --danger:#e85a4a; --plenty:#888;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif;min-height:100vh;}

/* ========== LOGIN SCREEN ========== */
#loginScreen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; padding:20px;
}
.login-box {
  background:var(--card); border:1px solid var(--border);
  border-radius:24px; padding:48px 40px; width:100%; max-width:420px;
  animation:fadeUp .4s ease;
}
.login-logo {
  text-align:center; margin-bottom:36px;
}
.login-logo::before {
  content:''; display:block; width:40px; height:4px;
  background:var(--accent); margin:0 auto 16px; border-radius:2px;
}
.login-logo h1 {
  font-family:'Unbounded',sans-serif; font-size:28px; font-weight:900;
}
.login-logo h1 span{color:var(--accent);}
.login-logo p{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.login-label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.login-input {
  width:100%; background:var(--card2); border:1px solid var(--border);
  border-radius:12px; color:var(--text); font-family:'Manrope',sans-serif;
  font-size:15px; padding:13px 16px; outline:none; transition:.2s;
  margin-bottom:16px;
}
.login-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,200,74,.1);}
.login-btn {
  width:100%; background:var(--accent); color:#000; border:none;
  border-radius:12px; font-family:'Unbounded',sans-serif; font-size:13px;
  font-weight:700; padding:14px; cursor:pointer; transition:.2s; letter-spacing:1px;
}
.login-btn:hover{background:#f0d55a;}
.login-error{color:var(--danger);font-size:12px;text-align:center;margin-top:12px;min-height:18px;}
.login-hint{color:var(--muted);font-size:11px;text-align:center;margin-top:20px;line-height:1.6;}

/* ========== MAIN APP ========== */
#app{display:none; padding:40px 20px 80px;}

.header{text-align:center;margin-bottom:40px;}
.header::before{content:'';display:block;width:50px;height:4px;background:var(--accent);margin:0 auto 20px;border-radius:2px;}
.header h1{font-family:'Unbounded',sans-serif;font-size:clamp(20px,5vw,42px);font-weight:900;letter-spacing:-1px;}
.header h1 span{color:var(--accent);}
.header p{color:var(--muted);margin-top:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;}

.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  max-width:1400px;margin:0 auto 32px;padding:0 4px;}
.user-badge{display:flex;align-items:center;gap:8px;background:var(--card);
  border:1px solid var(--border);border-radius:50px;padding:8px 16px;font-size:13px;}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);}
.user-dot.admin{background:var(--accent);}
.user-name{font-weight:600;}
.user-role{color:var(--muted);font-size:11px;}

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;border-radius:50px;
  font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.btn-accent{background:var(--accent);color:#000;}
.btn-accent:hover{background:#f0d55a;}
.btn-green{background:#4ade80;color:#000;}
.btn-green:hover{background:#5aee90;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{border-color:#555;background:#222;}
.btn-danger-soft{background:rgba(232,90,74,.12);color:var(--danger);border:1px solid rgba(232,90,74,.2);}
.btn-danger-soft:hover{background:rgba(232,90,74,.2);}
.btn-sm{padding:5px 14px;font-size:12px;}

.toolbar-btns{display:flex;gap:8px;flex-wrap:wrap;}

.last-saved{font-size:11px;color:var(--muted);text-align:center;margin-bottom:24px;letter-spacing:.5px;}

/* LEGEND */
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:36px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* SECTIONS */
.sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;max-width:1400px;margin:0 auto;}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.section-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.section-icon{font-size:17px;}
.section-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);flex:1;}
.section-count{font-size:10px;color:var(--muted);background:var(--border);padding:3px 9px;border-radius:20px;}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:8px 16px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);}
thead th:not(:first-child):not(:nth-child(2)){text-align:center;}
tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.025);}
td{padding:9px 16px;font-size:13px;vertical-align:middle;}
.td-num{color:var(--muted);font-size:11px;width:28px;padding-right:0;}
.td-name{font-weight:500;}
.td-order{text-align:center;color:var(--muted);}
.td-stock{text-align:center;}
.td-status{text-align:center;}
.td-actions{text-align:center;white-space:nowrap;}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.badge.ok{background:rgba(74,222,128,.12);color:var(--ok);}
.badge.warn{background:rgba(232,200,74,.12);color:var(--warn);}
.badge.danger{background:rgba(232,90,74,.15);color:var(--danger);}
.badge.plenty{background:rgba(255,255,255,.05);color:var(--muted);}

/* INPUTS */
.stock-input{background:var(--card2);border:1px solid #3a3a3a;border-radius:8px;color:var(--text);
  font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;padding:5px 10px;width:90px;
  outline:none;text-align:center;transition:.2s;}
.stock-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(232,200,74,.15);}
.status-select{background:var(--card2);border:1px solid #3a3a3a;border-radius:8px;color:var(--text);
  font-family:'Manrope',sans-serif;font-size:12px;padding:5px 8px;outline:none;cursor:pointer;width:100%;}
.order-input{background:var(--card2);border:1px solid #3a3a3a;border-radius:8px;color:var(--text);
  font-family:'Manrope',sans-serif;font-size:13px;padding:5px 10px;width:90px;outline:none;text-align:center;transition:.2s;}
.order-input:focus{border-color:var(--accent);}
.name-input{background:var(--card2);border:1px solid #3a3a3a;border-radius:8px;color:var(--text);
  font-family:'Manrope',sans-serif;font-size:13px;padding:5px 10px;width:120px;outline:none;transition:.2s;}
.name-input:focus{border-color:var(--accent);}

/* ADD ROW */
.add-row td{background:rgba(232,200,74,.03);border-top:1px dashed rgba(232,200,74,.2)!important;}
.add-row input{margin:2px;}

/* DELETE BTN */
.del-btn{background:none;border:none;cursor:pointer;color:#555;font-size:15px;padding:2px 6px;border-radius:6px;transition:.2s;}
.del-btn:hover{color:var(--danger);background:rgba(232,90,74,.1);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1a1a1a;border:1px solid #4ade80;color:#4ade80;
  padding:12px 28px;border-radius:50px;font-size:14px;font-weight:600;
  transition:transform .3s ease;z-index:200;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}

/* ========== MODAL ========== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;
  align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:32px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;animation:fadeUp .3s ease;}
.modal h2{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;color:var(--accent);margin-bottom:24px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}
.modal-close:hover{color:var(--text);}

/* HISTORY TABLE */
.hist-table{width:100%;border-collapse:collapse;font-size:12px;}
.hist-table th{padding:8px 12px;font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);text-align:left;border-bottom:1px solid var(--border);}
.hist-table td{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:top;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-who{font-weight:600;color:var(--text);}
.hist-time{color:var(--muted);font-size:11px;}
.hist-what{color:var(--muted);}
.hist-change{font-family:monospace;font-size:11px;}
.hist-old{color:var(--danger);}
.hist-new{color:var(--ok);}
.hist-empty{text-align:center;color:var(--muted);padding:32px!important;font-size:13px;}

/* STAFF TABLE */
.staff-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.staff-row{display:flex;align-items:center;gap:10px;background:var(--card2);
  border:1px solid var(--border);border-radius:12px;padding:12px 16px;}
.staff-name{flex:1;font-weight:600;}
.staff-role{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.add-staff{display:flex;gap:8px;flex-wrap:wrap;}
.staff-input{flex:1;min-width:140px;background:var(--card2);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-family:'Manrope',sans-serif;font-size:14px;
  padding:10px 14px;outline:none;transition:.2s;}
.staff-input:focus{border-color:var(--accent);}

@media(max-width:600px){
  td,thead th{padding:8px 10px;}
  .section-header{padding:12px 10px;}
  .stock-input,.order-input{width:68px;}
  .login-box{padding:32px 24px;}
  .modal{padding:24px 18px;}
}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">

        onkeydown="if(event.key==='Enter')doLogin()">

    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Сотрудники — вводят только имя<br>Надир — вводит имя + пароль</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">

<!-- ===== MODALS ===== -->
<!-- История -->
<div class="modal-overlay" id="historyModal">

    <div id="historyContent"></div>
  </div>
</div>

<!-- Сотрудники -->
<div class="modal-overlay" id="staffModal">

    <button class="modal-close" onclick="closeModal('staffModal')">✕</button>
    <h2>👥 Управление сотрудниками</h2>
    <div id="staffContent"></div>
  </div>
</div>

<!-- Смена пароля -->
<div class="modal-overlay" id="passModal">

    <button class="login-btn" onclick="doChangePass()">СОХРАНИТЬ ПАРОЛЬ</button>

<div class="toast" id="toast"></div>

// Автоматический цвет по сравнению чисел
function parseNum(str) {
  // Извлекаем первое число из строки типа "5 кг", "3,5 л", "много"
  if (!str) return null;
  const s = String(str).replace(',', '.');
  const m = s.match(/[\d.]+/);
  return m ? parseFloat(m[0]) : null;
}

// Разбивает "5 кг" → {num:"5", unit:"кг"}, "много" → {num:"много", unit:""}
function splitUnit(str) {
  if (!str) return {num:'', unit:''};
  const s = String(str).trim();
  const m = s.match(/^([\d.,]+)\s*(.*)$/);
  if (m) return {num: m[1], unit: m[2].trim()};
  return {num: s, unit: ''};
}

function autoStatus(order, stock) {
  const norm = parseNum(order);
  const have = parseNum(stock);
  if (norm === null || have === null) return 'plenty'; // "много" или текст — серый
  const ratio = have / norm;
  if (ratio >= 1)   return 'ok';
  if (ratio >= 0.5) return 'warn';
  return 'danger';
}

async function doLogin() {

const JSONBIN_API_KEY = '$2a$10$VKEMrudT7NbIDEcSBbvKse3lESPow2Hpt2tcoZedrAZERb1tmRY5q';

async function jbGet() {
  if (!binId) return null;
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }
  });
  if (!r.ok) return null;
  const j = await r.json();
  return j.record || null;
}

async function jbSet(record) {
  const r = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify(record)
  });
  if (!r.ok) throw new Error('update failed');
}

let staffEditMode = false;
let staffSnapshot = null; // snapshot before editing

function toggleStaffEdit() {
  staffEditMode = !staffEditMode;
  editMode = staffEditMode;
  document.getElementById('staffEditToggle').textContent = staffEditMode ? '👁 Просмотр' : '✏️ Изменить склад';
  document.getElementById('staffSaveBtn').style.display = staffEditMode ? 'inline-flex' : 'none';
  if (staffEditMode) {
    // Snapshot всех разделов
    staffSnapshot = JSON.parse(JSON.stringify(appData));
  }
  render();
}

async function saveStaffChanges() {
  const changes = [];
  appData.forEach(sec => {
    const snapSec = staffSnapshot && staffSnapshot.find(s => s.id === sec.id);
    if (!snapSec) return;
    sec.items.forEach(item => {
      const old = snapSec.items.find(i => i.id === item.id);
      if (old && old.stock !== item.stock) {
        changes.push({
          product: item.name,
          field: 'количество',
          old: old.stock,
          new: item.stock
        });
      }
    });
  });
  if (changes.length === 0) {
    showToast('Нет изменений', false);
    staffEditMode = false; editMode = false;
    document.getElementById('staffEditToggle').textContent = '✏️ Изменить склад';
    document.getElementById('staffSaveBtn').style.display = 'none';
    render(); return;
  }
  try {
    addHistory(changes);
    await saveProductData();
    await saveHistory();
    staffEditMode = false; editMode = false;
    staffSnapshot = null;
    document.getElementById('staffEditToggle').textContent = '✏️ Изменить склад';
    document.getElementById('staffSaveBtn').style.display = 'none';
    updateLastSaved();
    render();
    showToast('✅ Сохранено! Все увидят изменения.');
  } catch(e) { showToast('❌ Ошибка сохранения', true); }
}

async function saveChanges() {
  try {
    await saveProductData();
    await saveHistory();
    editMode = false;
    document.getElementById('editToggle').textContent = '✏️ Редактировать';
    document.getElementById('saveBtn').style.display = 'none';
    updateLastSaved();
    render();
    showToast('✅ Сохранено!');
  } catch(e) { showToast('❌ Ошибка сохранения', true); }
}

// ============================================================
// DATA MUTATIONS
// ============================================================
function updateStock(sid, iid, val) {
  const item = getItem(sid, iid);
  if (item) item.stock = val;
}
function updateStockNum(sid, iid, numVal, unit) {
  const item = getItem(sid, iid);
  if (!item) return;
  const n = numVal.trim();
  item.stock = unit ? (n + ' ' + unit) : n;
}
function updateName(sid, iid, val) {
  const item = getItem(sid, iid);
  if (item) item.name = val;
}
function updateOrder(sid, iid, val) {
  const item = getItem(sid, iid);
  if (item) item.order = val;
}
function getItem(sid, iid) {
  const sec = appData.find(s=>s.id===sid);
  return sec && sec.items.find(i=>i.id===iid);
}

function deleteItem(sid, iid) {
  const sec = appData.find(s=>s.id===sid);
  if (!sec) return;
  const item = sec.items.find(i=>i.id===iid);
  if (!item) return;
  if (!confirm(`Удалить «${item.name}»?`)) return;
  sec.items = sec.items.filter(i=>i.id!==iid);
  addHistory([{product: item.name, field:'удалено', old:'—', new:'удалён'}]);
  render();
}

function addItem(sid) {
  const sec = appData.find(s=>s.id===sid);
  if (!sec) return;
  const name  = document.getElementById(`new_name_${sid}`).value.trim();
  const order = document.getElementById(`new_order_${sid}`).value.trim();
  const stock = document.getElementById(`new_stock_${sid}`).value.trim();
  if (!name) { showToast('⚠ Введите название', true); return; }
  const newId = 'i' + Date.now();
  sec.items.push({id: newId, name, order: order||'—', stock: stock||'—'});
  addHistory([{product: name, field:'добавлено', old:'—', new: stock||'—'}]);
  render();
  showToast(`✅ «${name}» добавлен`);
}

function openHistory() {
  const el = document.getElementById('historyContent');
  if (history.length === 0) {
    el.innerHTML = '<table class="hist-table"><tbody><tr><td class="hist-empty">История пуста</td></tr></tbody></table>';
  } else {
    const rows = [...history].reverse().map(h => {
      const changesHtml = h.changes.map(c =>
        `<div class="hist-change">• ${esc(c.product)}: <span class="hist-old">${esc(c.old)}</span> → <span class="hist-new">${esc(c.new)}</span></div>`
      ).join('');
      return `<tr>
        <td><span class="hist-who">${esc(h.who)}</span><br><span class="hist-time">${h.when}</span></td>
        <td class="hist-what">${changesHtml}</td>
      </tr>`;
    }).join('');
    el.innerHTML = `<table class="hist-table">
      <thead><tr><th>Кто / Когда</th><th>Что изменено</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }
  // Admin can clear history
  el.innerHTML += `<div style="text-align:right;margin-top:16px;">
    <button class="btn btn-danger-soft btn-sm" onclick="clearHistory()">🗑 Очистить историю</button>
